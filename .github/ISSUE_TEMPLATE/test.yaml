name: "Nová postava"
description: "Formulář pro přidání nové postavy do databáze"
body:
  - type: markdown
    attributes:
      value: |
        Děkujeme za zájem o rozšíření **GBDB**! Prosím, vyplňte pole níže.
  - type: input
    id: char_id
    attributes:
      label: "ID postavy"
      placeholder: "např. raiden-shogun"
    validations:
      required: true
  - type: dropdown
    id: element
    attributes:
      label: "Element"
      options:
        - Pyro
        - Hydro
        - Electro
        - Anemo
        - Dendro
        - Geo
        - Cryo
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: "Popis talentů"
      placeholder: "Popište, co talent dělá..."
    validations:
      required: true
