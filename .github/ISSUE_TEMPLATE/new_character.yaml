name: Add character
description: add new Genshin Impact character to database
body:
- type: input
  id: name
  attributes:
    label: Character name
    description: Name of Character
    placeholder: Character Name
  validations:
    required: true
- type: dropdown
  id: element
  attributes:
    label: Element
    options:
    - Pyro
    - Hydro
    - Electro
    - Anemo
    - Dendro
    - Geo
    - Cryo
  validations:
    required: true
